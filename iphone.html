<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iphone Details</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background-color: #007bff;
            color: white;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        .content-box {
            display: flex;
            gap: 20px;
            background-color: white;
            padding: 21px;  
            border-radius: 10px;
            box-shadow: 5px 5px 15px black;
            max-width: 1000px; 
            width: 100%;
        }

        .content-box img {
            border-radius: 8px;
        }

        .details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .details h2 {
            margin: 0;
            color: gray;
        }

        .details p {
            color: gray;
        }

        .buy-back, .add-to-cart {
            margin-top: 10px;
            padding: 10px 15px;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
        }

        .buy-back:hover, .add-to-cart:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>iphone</h1>
    </header>
    <main>
        <div class="content-box">
            <img width="350px" src="ihone.jpg" alt="Air Conditioner"> 
            <div class="details">
                <h2>iphone</h2>
                <p>
                    iPhone 16 Pro Max 256 GB: 5G Mobile Phone with Camera Control, 4K 120 fps Dolby Vision and a Huge Leap in Battery Life. Works with AirPods; Natural Titanium
                </p>
                <p>Condition: Nice</p>
                <p>Damage Percent: 5% </p>
                <p>Discount : 25% INR</p>
                <p><strong>Price:</strong> </p>
                <a href="buy.html" class="buy-back">Back to Buy Page</a>
                <a href="cart.html" class="add-to-cart">Add to Cart</a> <!-- Add to Cart button -->
            </div>
        </div>
    </main>
</body>
</html>
